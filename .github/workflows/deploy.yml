name: Sync secrets to Vercel

# Vercel deploys automatically via its GitHub integration on every push.
# This workflow only keeps the Vercel project's env vars in sync with GitHub Secrets,
# so API keys never need to be typed into any dashboard manually.

on:
  push:
    branches: [main]

jobs:
  sync-env:
    runs-on: ubuntu-latest

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync API keys to Vercel project
        run: |
          printf '%s' "$DUNE_API_KEY"     | vercel env add DUNE_API_KEY     production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "$RESOLVED_API_KEY" | vercel env add RESOLVED_API_KEY production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "omnipair"          | vercel env add NEXT_PUBLIC_PROJECT_SLUG production --token=${{ secrets.VERCEL_TOKEN }} --force
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          RESOLVED_API_KEY: ${{ secrets.RESOLVED_API_KEY }}
